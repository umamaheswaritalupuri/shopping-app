apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-backend
  template:
    metadata:
      labels:
        app: shopping-backend
    spec:
      containers:
      - name: shopping-backend
        image: umamaheswari/shopping-backend:1.0
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-backend-service
spec:
  type: ClusterIP
  selector:
    app: shopping-backend
  ports:
    - port: 8000
      targetPort: 8000

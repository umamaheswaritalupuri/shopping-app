apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS shopping;
      USE shopping;

    CREATE TABLE IF NOT EXISTS products (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      price DECIMAL(10,2) NOT NULL
    );

    INSERT INTO products (name, price) VALUES
    ('Laptop', 999.99),
    ('Smartphone', 699.99),  
    ('Headphones', 199.99),
    ('Shoes', 89.99),
    ('Backpack', 49.99);


---
apiVersion: v1
kind: Service
metadata:
  name: shopping-db
spec:
  type: ClusterIP
  selector:
    app: shopping-db
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shopping-db
spec:
  serviceName: "shopping-db"
  replicas: 1
  selector:
    matchLabels:
      app: shopping-db
  template:
    metadata:
      labels:
        app: shopping-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: password123
        - name: MYSQL_DATABASE
          value: shopping
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-init
        configMap:
          name: mysql-init-config
  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-frontend
  template:
    metadata:
      labels:
        app: shopping-frontend
    spec:
      containers:
      - name: shopping-frontend
        image: umamaheswari/shopping-frontend:1.0
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-frontend-service
spec:
  type: NodePort
  selector:
    app: shopping-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
